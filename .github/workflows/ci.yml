name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Lint
        run: ./gradlew ktlintCheck detekt
      - name: Shared KMP common test
        run: ./gradlew :shared:desktopTest
      - name: Android unit test
        run: ./gradlew :shared:testDebugUnitTest
      - name: Server tests (Flyway + schema parity, Docker-backed)
        run: ./gradlew :server:test
      # Plan-3 Task 41: explicit CI guards so a regression here fails fast in
      # its own job step (rather than buried in the giant :server:test log).
      # These are the BREAK-glass tests — every one of them encodes a
      # legal/council mandate.
      - name: Server CI guards (Plan-3 break-glass)
        run: |
          ./gradlew :server:test \
            --tests "com.dietician.server.db.RlsBypassPreventionTest" \
            --tests "com.dietician.server.ci.EmotionInferencePreventionTest" \
            --tests "com.dietician.server.ci.PiiRedactionRequiredTest" \
            --tests "com.dietician.server.db.MigrationOrderingTest"
      - name: Assemble all
        run: ./gradlew :server:assemble :desktopApp:assemble :androidApp:assembleDebug
